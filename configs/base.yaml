# Base configuration for InftyThink experiments
model:
  vocab_size: 32000
  n_layers: 6
  d_model: 512
  n_heads: 8
  d_ff: 2048
  max_seq_len: 1024
  dropout: 0.1
  tie_embeddings: true

training:
  batch_size: 8
  grad_accumulation_steps: 4
  max_steps: 10000
  eval_every: 500
  save_every: 1000
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  seed: 42
  warmup_steps: 200

data:
  n_train: 5000
  n_eval: 500
  seed: 42
  segment_len: 128
  summary_len: 32
  tokenizer: "gpt2"

inference:
  segment_len: 128
  summary_len: 32
  max_iterations: 4
  token_budget: 2048
  conditioning: "summary_only"
  tail_len: 32
  temperature: 0.7
  top_p: 0.95
